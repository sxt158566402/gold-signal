<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>GoldSniper</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0a0a0f;color:#e8e8f0;min-height:100vh}
.bar{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#12121a;border-bottom:1px solid #2a2a35;position:sticky;top:0;z-index:100}
.logo{font-weight:700;color:#FFD700;font-size:16px}
.conn{font-size:12px;color:#888;display:flex;align-items:center;gap:6px}
.conn .dot{width:8px;height:8px;border-radius:50%;background:#666}
.conn.ok .dot{background:#2ed573;box-shadow:0 0 6px #2ed573}
.conn.err .dot{background:#ff4757}
.hero{text-align:center;padding:30px 16px 20px;background:linear-gradient(180deg,#12121a,#0a0a0f)}
.hero .label{font-size:13px;color:#888;margin-bottom:4px}
.hero .price{font-size:52px;font-weight:800;color:#FFD700;line-height:1.1}
.hero .chg{margin-top:8px;font-size:14px;display:flex;justify-content:center;gap:12px}
.up{color:#2ed573}.down{color:#ff4757}
.ranges{display:flex;justify-content:center;gap:24px;margin-top:16px}
.ranges .it{text-align:center}
.ranges .it .l{display:block;font-size:11px;color:#666}
.ranges .it .v{font-size:14px;font-weight:700}
.time{font-size:11px;color:#555;margin-top:12px}
.sig{padding:16px}
.wait{text-align:center;padding:40px 20px;color:#666}
.card{border-radius:12px;padding:20px;margin:0 auto 16px;max-width:400px;animation:fi .5s}
.card.long{background:linear-gradient(135deg,rgba(46,213,115,.15),rgba(46,213,115,.05));border:1px solid rgba(46,213,115,.3)}
.card.short{background:linear-gradient(135deg,rgba(255,71,87,.15),rgba(255,71,87,.05));border:1px solid rgba(255,71,87,.3)}
.card .hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.badge{padding:4px 12px;border-radius:20px;font-size:13px;font-weight:700}
.badge.long{background:#2ed573;color:#000}
.badge.short{background:#ff4757;color:#fff}
.row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.row:last-child{border:none}
.row .l{color:#aaa;font-size:13px}
.row .v{font-weight:700;font-size:15px}
.row.m .v{color:#FFD700;font-size:18px}
.sl{color:#ff4757!important}.tp{color:#2ed573!important}
.reason{margin-top:12px;padding:10px;background:rgba(255,255,255,.03);border-radius:8px;font-size:12px;color:#aaa;line-height:1.5}
.ind{padding:16px}
.ind .t{font-size:14px;font-weight:700;color:#FFD700;margin-bottom:12px}
.ig{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.ii{background:#12121a;border:1px solid #2a2a35;border-radius:8px;padding:12px 8px;text-align:center}
.ii .n{font-size:11px;color:#888;margin-bottom:4px}
.ii .v{font-size:14px;font-weight:700}
.ov{color:#2ed573}.ob{color:#ff4757}
.ap{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:center;justify-content:center}
.api{text-align:center;padding:40px}
.api p{color:#e8e8f0;margin-bottom:8px}
.api .s{font-size:13px;color:#888}
.abtn{margin-top:20px;padding:14px 32px;background:linear-gradient(135deg,#FFD700,#b8960f);color:#000;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer}
.hid{display:none!important}
@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.5}}
.pu{animation:pu 2s infinite}
@media(max-width:380px){.hero .price{font-size:40px}.ig{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="ap" id="ap"><div class="api">
<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#FFD700" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
<p style="font-size:18px;font-weight:700">點擊啟用語音提醒</p>
<p class="s">信號觸發時語音播報：「可以下單了，記得止損！」</p>
<button class="abtn" onclick="ea()">🔊 啟用喇叭提醒</button>
</div></div>
<header class="bar"><div class="logo">⚡ GoldSniper</div><div class="conn" id="cs"><span class="dot"></span><span class="t">連接中...</span></div></header>
<section class="hero">
<div class="label">PAXG (黃金) 實時價格</div>
<div class="price" id="mp">----</div>
<div class="chg"><span id="cv">--</span><span id="cp">--</span></div>
<div class="ranges">
<div class="it"><span class="l">24h高</span><span class="v" id="h24">--</span></div>
<div class="it"><span class="l">24h低</span><span class="v" id="l24">--</span></div>
<div class="it"><span class="l">波幅</span><span class="v" id="rng">--</span></div>
</div>
<div class="time" id="dt"></div>
</section>
<section class="sig">
<div class="wait" id="sw"><div class="pu" style="font-size:48px;margin-bottom:12px">⏳</div><p style="font-size:16px;font-weight:700">等待信號中...</p><p style="font-size:13px;color:#555;margin-top:6px">系統監控中，大漲大跌後企穩會自動提示</p></div>
<div class="card long hid" id="ls"><div class="hd"><span class="badge long">📈 做多</span><span id="lt"></span></div><div class="row m"><span class="l">進場價位</span><span class="v" id="le">--</span></div><div class="row"><span class="l">止損 (-3)</span><span class="v sl" id="lsl">--</span></div><div class="row"><span class="l">止盈 (+6)</span><span class="v tp" id="ltp">--</span></div><div class="reason" id="lr"></div></div>
<div class="card short hid" id="ss"><div class="hd"><span class="badge short">📉 做空</span><span id="st"></span></div><div class="row m"><span class="l">進場價位</span><span class="v" id="se">--</span></div><div class="row"><span class="l">止損 (+3)</span><span class="v sl" id="ssl">--</span></div><div class="row"><span class="l">止盈 (-6)</span><span class="v tp" id="stp">--</span></div><div class="reason" id="sr"></div></div>
</section>
<section class="ind">
<div class="t">📊 技術指標</div>
<div class="ig">
<div class="ii"><div class="n">RSI(14)</div><div class="v" id="iR">--</div></div>
<div class="ii"><div class="n">EMA7</div><div class="v" id="i7">--</div></div>
<div class="ii"><div class="n">EMA25</div><div class="v" id="i2">--</div></div>
<div class="ii"><div class="n">BB上軌</div><div class="v" id="iU">--</div></div>
<div class="ii"><div class="n">BB中軌</div><div class="v" id="iM">--</div></div>
<div class="ii"><div class="n">BB下軌</div><div class="v" id="iL">--</div></div>
</div>
</section>
<script>
var ae=false,sy=window.speechSynthesis;
function sp(t){if(!ae||!sy)return;sy.cancel();var u=new SpeechSynthesisUtterance(t);u.lang='zh-TW';u.rate=0.9;var v=sy.getVoices();for(var i=0;i<v.length;i++){if(v[i].lang.indexOf('zh')>=0){u.voice=v[i];break;}}sy.speak(t);}
function vb(){if(navigator.vibrate)navigator.vibrate([200,100,200]);}
function ea(){ae=true;document.getElementById('ap').classList.add('hid');sp('語音提醒已啟用');}
function sc(ok,t){var e=document.getElementById('cs');e.className='conn '+(ok?'ok':'err');e.querySelector('.t').textContent=t||(ok?'已連接':'斷線');}
function f(n,d){return parseFloat(n).toFixed(d||2);}
function ft(ts){var d=new Date(ts);return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')+':'+d.getSeconds().toString().padStart(2,'0');}
if(sy){sy.getVoices();sy.onvoiceschanged=function(){sy.getVoices();};}

var lastSignal = '';

async function load(){
try{
  var r = await fetch('data/data.json?t=' + Date.now(), {cache:'no-store'});
  var d = await r.json();
  if(d.error) throw new Error(d.error);
  var t = d.ticker;
  var s = d.strategy;
  var p = parseFloat(t.lastPrice);
  var c = parseFloat(t.priceChange);
  var cp = parseFloat(t.priceChangePercent);
  
  document.getElementById('mp').textContent = '$' + f(p);
  document.getElementById('cv').textContent = (c>=0?'+':'') + f(c);
  document.getElementById('cv').className = c>=0?'up':'down';
  document.getElementById('cp').textContent = '(' + (cp>=0?'+':'') + f(cp) + '%)';
  document.getElementById('cp').className = cp>=0?'up':'down';
  document.getElementById('h24').textContent = '$' + f(t.highPrice);
  document.getElementById('l24').textContent = '$' + f(t.lowPrice);
  document.getElementById('rng').textContent = '$' + f(t.highPrice - t.lowPrice);
  
  var now = new Date();
  document.getElementById('dt').textContent = '更新: ' + ft(d.timestamp) + ' (每分鐘)';
  sc(true, '已連接');
  
  document.getElementById('sw').classList.add('hid');
  document.getElementById('ls').classList.add('hid');
  document.getElementById('ss').classList.add('hid');
  
  if(s.indicators){
    var i = s.indicators;
    var re = document.getElementById('iR');
    re.textContent = f(i.rsi, 1);
    re.className = 'v' + (i.rsi<30?' ov':i.rsi>70?' ob':'');
    document.getElementById('i7').textContent = '$' + f(i.ema7);
    document.getElementById('i2').textContent = '$' + f(i.ema25);
    document.getElementById('iU').textContent = '$' + f(i.bbUpper);
    document.getElementById('iM').textContent = '$' + f(i.bbMiddle);
    document.getElementById('iL').textContent = '$' + f(i.bbLower);
  }
  
  if(s.signal === 'long'){
    document.getElementById('ls').classList.remove('hid');
    document.getElementById('le').textContent = '$' + f(s.price);
    document.getElementById('lsl').textContent = '$' + f(s.price - 3);
    document.getElementById('ltp').textContent = '$' + f(s.price + 6);
    document.getElementById('lt').textContent = ft(d.timestamp);
    document.getElementById('lr').textContent = '📋 ' + s.reason;
    if(lastSignal !== 'long') {
      sp('做多信號！進場價' + f(s.price) + '，記得止損！'); vb();
      lastSignal = 'long';
    }
  } else if(s.signal === 'short'){
    document.getElementById('ss').classList.remove('hid');
    document.getElementById('se').textContent = '$' + f(s.price);
    document.getElementById('ssl').textContent = '$' + f(s.price + 3);
    document.getElementById('stp').textContent = '$' + f(s.price - 6);
    document.getElementById('st').textContent = ft(d.timestamp);
    document.getElementById('sr').textContent = '📋 ' + s.reason;
    if(lastSignal !== 'short') {
      sp('做空信號！進場價' + f(s.price) + '，記得止損！'); vb();
      lastSignal = 'short';
    }
  } else {
    document.getElementById('sw').classList.remove('hid');
    lastSignal = '';
  }
} catch(e){
  console.error(e);
  sc(false, '斷線-重試中...');
}
}
load();
setInterval(load, 30000);
</script>
</body>
</html>
