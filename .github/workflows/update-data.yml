name: Update Data
on:
  schedule:
    - cron: '*/2 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > /tmp/update.py << 'PYEOF'
import json, datetime, base64, urllib.request, os

token = os.environ['GH_TOKEN']
print(f"Starting update...")

# Fetch price
ticker = None
for base in ["https://api1.binance.com", "https://api.binance.com", "https://api2.binance.com"]:
    try:
        req = urllib.request.Request(f"{base}/api/v3/ticker/24hr?symbol=PAXGUSDT")
        ticker = json.load(urllib.request.urlopen(req, timeout=15))
        print(f"Ticker from {base} OK: {ticker['lastPrice']}")
        break
    except Exception as e:
        print(f"{base} failed: {e}")

if not ticker:
    try:
        req = urllib.request.Request("https://api.coingecko.com/api/v3/simple/price?ids=pax-gold&vs_currencies=usd")
        cg = json.load(urllib.request.urlopen(req, timeout=15))
        ticker = {'lastPrice': str(cg['pax-gold']['usd'])}
        print(f"CoinGecko OK: {ticker['lastPrice']}")
    except Exception as e:
        print(f"All APIs failed: {e}")
        exit(1)

price = float(ticker['lastPrice'])
now = int(datetime.datetime.now(datetime.timezone.utc).timestamp() * 1000)
print(f"Timestamp: {now}")

data = {
    "ticker": ticker,
    "klines": [],
    "strategy": {
        "signal": "waiting",
        "price": price,
        "reason": "監控中",
        "indicators": {
            "rsi": 50, "ema7": price, "ema25": price,
            "bbUpper": price, "bbMiddle": price, "bbLower": price
        }
    },
    "timestamp": now
}

# Upload
content = base64.b64encode(json.dumps(data, indent=2).encode()).decode()
req = urllib.request.Request(
    "https://api.github.com/repos/sxt158566402/gold-signal/contents/data/data.json?ref=gh-pages",
    headers={"Authorization": f"token {token}", "Accept": "application/vnd.github.v3+json"}
)
sha = json.load(urllib.request.urlopen(req))["sha"]
body = {
    "message": f"update {datetime.datetime.now(datetime.timezone.utc).strftime('%H:%M:%S')}",
    "content": content,
    "sha": sha,
    "branch": "gh-pages"
}
req2 = urllib.request.Request(
    "https://api.github.com/repos/sxt158566402/gold-signal/contents/data/data.json",
    data=json.dumps(body).encode(),
    headers={"Authorization": f"token {token}", "Content-Type": "application/json", "Accept": "application/vnd.github.v3+json"},
    method="PUT"
)
r = json.load(urllib.request.urlopen(req2))
if "content" in r:
    print(f"SUCCESS: price=${price}")
else:
    print(f"ERROR: {r.get('message','?')}")
PYEOF
          python3 /tmp/update.py
