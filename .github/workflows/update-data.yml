name: Update Gold Data
on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Fetch data and update
        run: |
          python3 -c "
          import json, urllib.request, datetime
          
          ticker = json.loads(urllib.request.urlopen('https://api.binance.com/api/v3/ticker/24hr?symbol=PAXGUSDT', timeout=10).read())
          klines = json.loads(urllib.request.urlopen('https://api.binance.com/api/v3/klines?symbol=PAXGUSDT&interval=5m&limit=50', timeout=10).read())
          
          closes = [float(k[4]) for k in klines]
          highs = [float(k[2]) for k in klines]
          lows = [float(k[3]) for k in klines]
          
          period = 14
          gains, losses = 0, 0
          for i in range(len(closes)-period, len(closes)):
              d = closes[i] - closes[i-1]
              if d > 0: gains += d
              else: losses -= d
          rsi = 100 - (100/(1+gains/losses)) if losses > 0 else 50
          
          s = closes[-20:]
          m = sum(s)/20
          std = (sum((x-m)**2 for x in s)/20)**0.5
          ema7 = sum(closes[-7:])/min(7,len(closes))
          ema25 = sum(closes[-25:])/min(25,len(closes))
          
          rh, rl = highs[-10:], lows[-10:]
          maxH, minL = max(rh), min(rl)
          p = float(ticker['lastPrice'])
          signal, reason = 'waiting', '監控中'
          if p > maxH and rsi > 50:
              signal, reason = 'long', '突破近10根K線高點+RSI偏多'
          elif p < minL and rsi < 50:
              signal, reason = 'short', '跌破近10根K線低點+RSI偏空'
          
          data = {
              'ticker': ticker,
              'strategy': {'signal': signal, 'price': p, 'reason': reason,
                  'indicators': {'rsi': round(rsi,2), 'ema7': round(ema7,2), 'ema25': round(ema25,2),
                      'bbUpper': round(m+2*std,2), 'bbMiddle': round(m,2), 'bbLower': round(m-2*std,2)}},
              'timestamp': int(datetime.datetime.now(datetime.timezone.utc).timestamp()*1000)
          }
          
          with open('data/data.json', 'w') as f:
              json.dump(data, f, indent=2)
          print('Updated:', p)
          "

      - name: Push to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/data.json
          git diff --cached --quiet || git commit -m "update data $(date -u +%H:%M:%S)" && git push
