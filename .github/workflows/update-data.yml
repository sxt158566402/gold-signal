name: Update Data
on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch PAXG data
        run: |
          if curl -sf --max-time 10 "https://api1.binance.com/api/v3/ticker/24hr?symbol=PAXGUSDT" > /tmp/ticker.json; then
            curl -sf --max-time 10 "https://api1.binance.com/api/v3/klines?symbol=PAXGUSDT&interval=5m&limit=50" > /tmp/klines.json
            echo "SOURCE=binance" >> $GITHUB_ENV
          elif curl -sf --max-time 10 "https://api.coingecko.com/api/v3/simple/price?ids=pax-gold&vs_currencies=usd" > /tmp/cg.json; then
            echo "SOURCE=coingecko" >> $GITHUB_ENV
          else
            echo "SKIP=true" >> $GITHUB_ENV
          fi

      - name: Build data.json
        if: env.SKIP != 'true'
        run: |
          python3 << 'PYEOF'
          import json, datetime, os, sys
          source = os.environ.get('SOURCE', '')
          now_ms = int(datetime.datetime.now(datetime.timezone.utc).timestamp() * 1000)
          if source == 'binance' and os.path.exists('/tmp/ticker.json'):
              t = json.load(open('/tmp/ticker.json'))
              k = json.load(open('/tmp/klines.json'))
              c = [float(x[4]) for x in k]
              h = [float(x[2]) for x in k]
              l = [float(x[3]) for x in k]
              g, ls2 = 0, 0
              for i in range(len(c)-14, len(c)):
                  d = c[i] - c[i-1]
                  if d > 0: g += d
                  else: ls2 -= d
              r = 100 - (100/(1+g/ls2)) if ls2 > 0 else 50
              s2 = c[-20:]
              m = sum(s2)/20
              sd = (sum((x-m)**2 for x in s2)/20)**0.5
              p = float(t['lastPrice'])
              rh, rl = h[-10:], l[-10:]
              sig, why = 'waiting', '監控中'
              if p > max(rh) and r > 50: sig, why = 'long', '突破近10根K線高點+RSI偏多'
              elif p < min(rl) and r < 50: sig, why = 'short', '跌破近10根K線低點+RSI偏空'
              data = {
                  'ticker': t,
                  'strategy': {'signal': sig, 'price': p, 'reason': why, 'indicators': {
                      'rsi': round(r,2), 'ema7': round(sum(c[-7:])/7,2),
                      'ema25': round(sum(c[-25:])/25,2), 'bbUpper': round(m+2*sd,2),
                      'bbMiddle': round(m,2), 'bbLower': round(m-2*sd,2)}},
                  'timestamp': now_ms
              }
              os.makedirs('data', exist_ok=True)
              with open('data/data.json', 'w') as f:
                  json.dump(data, f, indent=2)
              print(f'Binance OK: ${p} RSI={round(r,2)} sig={sig}')
          elif source == 'coingecko' and os.path.exists('/tmp/cg.json'):
              cg = json.load(open('/tmp/cg.json'))
              p = cg['pax-gold']['usd']
              data = {
                  'ticker': {'lastPrice': str(p), 'priceChange': '0', 'priceChangePercent': '0', 'highPrice': str(p), 'lowPrice': str(p)},
                  'strategy': {'signal': 'waiting', 'price': p, 'reason': 'CoinGecko only', 'indicators': {
                      'rsi': 50, 'ema7': p, 'ema25': p, 'bbUpper': p, 'bbMiddle': p, 'bbLower': p}},
                  'timestamp': now_ms
              }
              os.makedirs('data', exist_ok=True)
              with open('data/data.json', 'w') as f:
                  json.dump(data, f, indent=2)
              print(f'CoinGecko OK: ${p}')
          else:
              print('No data')
              sys.exit(0)
          PYEOF

      - name: Commit and push
        if: env.SKIP != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          TS=$(date -u +%H:%M:%S)
          if ! git diff --cached --quiet; then
            git commit -m "update $TS"
            git push origin gh-pages
            echo "PUSHED at $TS"
          else
            echo "No changes at $TS"
          fi
