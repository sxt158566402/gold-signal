<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>API测试</title></head>
<body>
<h2>OKX API 测试</h2>
<div id="result">加载中...</div>
<script>
async function test(){
  var div = document.getElementById('result');
  try{
    // 测试OKX
    div.innerHTML = '正在请求OKX API...';
    var t1 = Date.now();
    var kr = await fetch('https://www.okx.com/api/v5/market/ticker?instId=PAXG-USDT');
    var td = await kr.json();
    var t2 = Date.now();
    if(td.code === '0' && td.data && td.data[0]){
      var tk = td.data[0];
      div.innerHTML = '<h3 style="color:green">✅ OKX API正常!</h3>' +
        '<p>价格: $' + tk.last + '</p>' +
        '<p>24h最高: $' + tk.high24h + '</p>' +
        '<p>24h最低: $' + tk.low24h + '</p>' +
        '<p>耗时: ' + (t2-t1) + 'ms</p>';
    } else {
      div.innerHTML = '<h3 style="color:red">❌ OKX返回异常: ' + JSON.stringify(td).substring(0,200) + '</h3>';
    }
  } catch(e){
    div.innerHTML = '<h3 style="color:red">❌ 错误: ' + e.message + '</h3>';
  }
}
test();
</script>
</body>
</html>
